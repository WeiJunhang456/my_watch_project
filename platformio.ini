; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[env:esp32dev]
platform = espressif32@3.5.0   ; 锁定 v3.5 版本，和你的工具链一致
board = esp32dev
framework = espidf
monitor_speed = 115200
; 新增/修改这一行，指定 4MB Flash
board_upload.flash_size = 4MB
board_build.flash_mode = dio

; 2. 核心修复：指定4MB对应的分区表（关键！）
;    可选分区表模板（根据需求选）：
;    - factory_4MB.csv：单工厂分区，4MB全用（适合无OTA场景）
;    - ota_4MB.csv：OTA分区（2个APP分区，各1.5MB，剩余给文件系统）
board_build.partitions = factory_4MB.csv

;调试工具参数
;upload_protocol = serial ;用串口烧录
upload_port = COM3      ; 改成你自己的端口

; 【核心修复】强行定义缺失的宏，绕过 perfmon 编译错误
build_flags = 
    -D ESP32
;ESP32 芯片本身有 2 个硬件性能计数器，我们直接在编译参数里定义这个宏为 2，既符合硬件实际情况，又能绕过框架组件的配置缺失问题，不影响你代码的任何功能
    -D XCHAL_NUM_PERF_COUNTERS=2
    ; 只保留核心编译宏，无多余配置
    -I components/       ; 添加 components目录到头文件搜索路径
    -I src/             ; 添加 main/include 目录到头文件搜索路径
    ;-I main/source              ; 添加 main/source  目录到头文件搜索路径
    ;lvgl官方字体（除14号字），其他都在这里声明,不然会链接失败
    ;-D LV_FONT_MONTSERRAT_10=1
    ;-D LV_FONT_MONTSERRAT_48=1
    ;-D LV_FONT_MONTSERRAT_24=1
             

; 【核心修复】强制指定平台会检查的所有工具链，全用中科大镜像里真实存在的版本
;  哪怕不用RISC-V，也要写进去，让平台能找到包，不会去拉不存在的patch5
; 【正确写法】只指定中科大镜像里真实存在的版本号，不写URL,指明xtensa和riscv工具链
platform_packages =
    ;esp32dev真正需要的Xtensa工具链，绑定中科大镜像
    espressif/toolchain-xtensa-esp32 @ 8.4.0+2021r2-patch5
    ;强制指定RISC-V工具链为镜像可用版本
    espressif/toolchain-riscv32-esp @ 8.4.0+2021r2-patch5